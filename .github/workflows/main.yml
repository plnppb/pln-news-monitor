name: Auto Crawl PLN Papua

on:
  schedule:
    - cron: '0 0,6,12,18 * * *'  # Setiap 6 jam
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Crawl RSS Feeds (semua sumber, termasuk Infonesia)
        run: |
          SECRET="${{ secrets.CRON_SECRET }}"
          BASE="https://pln-news-monitor.vercel.app/api/crawl"
          BATCH_SIZE=30
          TOTAL_FEEDS=100
          TOTAL_BATCHES=$(( (TOTAL_FEEDS + BATCH_SIZE - 1) / BATCH_SIZE ))

          for i in $(seq 0 $((TOTAL_BATCHES - 1))); do
            echo "Crawling RSS batch $i..."
            RESULT=$(curl -s "${BASE}?secret=${SECRET}&keyword=PLN+Papua&batchIndex=${i}&batch=${BATCH_SIZE}")
            echo "Batch $i: $RESULT"
            sleep 3
          done

          echo "RSS feeds crawl done!"

      - name: Crawl External Sources (NewsAPI + Google News + GNews.io)
        run: |
          SECRET="${{ secrets.CRON_SECRET }}"
          BASE="https://pln-news-monitor.vercel.app/api/crawl"

          echo "Crawling external sources for multiple keywords..."
          for KW in \
            "PLN+Wilayah+Papua" \
            "PLN+Papua" \
            "PLN+Sorong" \
            "PLN+Jayapura" \
            "PLN+Manokwari" \
            "PLN+Papua+Barat" \
            "PLN+Papua+Selatan" \
            "PLN+Papua+Tengah" \
            "PLN+Papua+Pegunungan" \
            "listrik+Papua" \
            "pemadaman+listrik+Papua" \
            "PLN+Biak" \
            "PLN+Merauke" \
            "PLN+Nabire" \
            "PLN+Fakfak" \
            ; do
            echo "Keyword: $KW"
            RESULT=$(curl -s "${BASE}?secret=${SECRET}&keyword=${KW}&source=external")
            echo "Result: $RESULT"
            sleep 4
          done

          echo "External sources crawl done!"

      - name: Analyze New Articles
        run: |
          SECRET="${{ secrets.CRON_SECRET }}"
          echo "Running analyze batch..."
          for i in 1 2 3 4 5; do
            curl -s "https://pln-news-monitor.vercel.app/api/analyze-batch?secret=${SECRET}&batch=30"
            sleep 5
          done
          echo "Analyze done!"
